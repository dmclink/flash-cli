syntax = "proto3";
package addcard.v1;

import "common/v1/common.proto";
 
message InitRequest {}
message InitResponse {}

message ProcessRequest {
  common.v1.FilterSet filters = 1;
  repeated string modifiers = 2;
  common.v1.Flashcard card = 3;
}

message ProcessResponse {
  common.v1.Flashcard card = 1;
}

service AddCardService {
  rpc Init(InitRequest) returns (InitResponse);
  rpc Process(ProcessRequest) returns (ProcessResponse);
  rpc Shutdown(common.v1.ShutdownRequest) returns (common.v1.ShutdownResponse);
}
